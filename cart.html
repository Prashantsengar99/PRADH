<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | PRADH DESI FUEL</title>
    <link class="styles" rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo"><a href="index.html">PRADH <span></span></a></div>
            <div class="menu-toggle" id="menuToggle">
                <span></span><span></span><span></span>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="product.html" class="nav-link">Products</a></li>
                <li><a href="about.html" class="nav-link">Our Story</a></li>
                <li><a href="contact.html" class="nav-link">Contact & Policies</a></li>
                <li><a href="cart.html" class="nav-link cart-icon-wrapper active">Cart <span id="cart-count">0</span></a></li>
            </ul>
        </div>
    </header>

    <main class="section">
        <h2 class="section-title">Your Selected Items</h2>
        <div id="cart-wrapper">
            <!-- JavaScript dynamically renders items here -->
        </div>
        <!-- --- MY ORDERS SECTION --- -->
<section class="section" style="margin-top: 3rem; border-top: 2px dashed #ccc; padding-top: 2rem;">
    <h2 class="section-title">Track My Orders 📦</h2>
    <div style="max-width: 500px; margin: 0 auto 1.5rem auto; display: flex; gap: 0.5rem;">
        <input type="tel" id="searchOrderPhone" placeholder="Enter your 10-digit WhatsApp number" style="width: 100%; padding: 0.75rem; border: 1px solid #ccc; border-radius: 5px;">
        <button onclick="fetchMyOrders()" class="btn btn-primary" style="background-color: var(--accent-green); color: white; white-space: nowrap;">
            Show Orders
        </button>
    </div>
    <div id="my-orders-wrapper">
        <!-- Purane orders yahan dikhenge -->
    </div>
</section>

        <!-- --- POPUP DELIVERY DETAILS MODAL --- -->
        <div id="detailsModal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Delivery Details 🚚</h3>
                    <button class="close-modal-btn" onclick="closeDetailsModal()">✕</button>
                </div>
                <form id="checkoutForm" onsubmit="handleFormSubmit(event)">
                    <div class="form-group">
                        <label for="custName">Your Full Name *</label>
                        <input type="text" id="custName" required placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label for="custPhone">WhatsApp Number *</label>
                        <input type="tel" id="custPhone" required placeholder="Enter 10-digit mobile number" pattern="[0-9]{10}">
                    </div>
                    <div class="form-group">
                        <label for="custAddress">Full Delivery Address *</label>
                        <textarea id="custAddress" required rows="3" placeholder="House No., Street, Colony, Landmark..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="custPincode">Pincode *</label>
                        <input type="text" id="custPincode" required placeholder="6-digit Pincode" pattern="[0-9]{6}">
                    </div>
                    <div class="form-group">
                        <label for="paymentMethod">Preferred Payment Method</label>
                        <select id="paymentMethod">
                            <option value="UPI / Google Pay / PhonePe">UPI (Google Pay / PhonePe / Paytm)</option>
                            <option value="Cash On Delivery (COD)">Cash On Delivery (COD)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; background-color: var(--accent-green); color: white;">
                        Confirm Order on WhatsApp 🚀
                    </button>
                </form>
            </div>
        </div>
    </main>

   

    <script src="main.js"></script>
    <script src="cart.js"></script>
    <!-- Floating WhatsApp Chat Button -->
<a href="https://wa.me/918979993655?text=Hello%20PRADH%20Desi%20Fuel!%20I%20have%20a%20query%20about%20your%20product." 
   class="whatsapp-floating-btn" 
   target="_blank" 
   title="Chat with us on WhatsApp">

    <svg viewBox="0 0 32 32" class="whatsapp-svg">

    </svg>
</a>
<footer>
        <div style="max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 1rem;">
            <p>&copy; 2026 <span>PRADH</span>. All Rights Reserved.</p>

            <a href="https://forms.gle/wybyGnhVKrNikMJV6"

               📝 Share Your Feedback
            </a>
        </div>
    </footer>
</body>
</html>
