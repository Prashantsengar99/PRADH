<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - PRADH Desi Fuel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .auth-container {
            background: #1e293b;
            border-radius: 24px;
            border: 1px solid #334155;
            padding: 48px 40px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        .auth-container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(250, 204, 21, 0.03), transparent 70%);
            pointer-events: none;
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .auth-logo img {
            height: 50px;
            width: auto;
            border-radius: 12px;
        }
        .auth-logo h1 {
            color: #ffffff;
            font-size: 20px;
            font-weight: 700;
            margin-top: 8px;
        }
        .auth-logo h1 span {
            color: #facc15;
        }
        .auth-title {
            color: #ffffff;
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 4px;
        }
        .auth-subtitle {
            color: #94a3b8;
            text-align: center;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            color: #94a3b8;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .form-group label i {
            color: #facc15;
            margin-right: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: #ffffff;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: #facc15;
            box-shadow: 0 0 0 3px rgba(250, 204, 21, 0.08);
        }
        .form-group input::placeholder {
            color: #64748b;
        }
        .form-group .input-icon {
            position: relative;
        }
        .form-group .input-icon i {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            cursor: pointer;
            transition: color 0.3s;
        }
        .form-group .input-icon i:hover {
            color: #facc15;
        }
        .btn-auth {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #facc15, #eab308);
            color: #0f172a;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(250, 204, 21, 0.25);
        }
        .btn-auth:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 20px 0;
            color: #64748b;
            font-size: 13px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #334155;
        }
        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .btn-social {
            padding: 12px;
            border: 1px solid #334155;
            border-radius: 10px;
            background: transparent;
            color: #e2e8f0;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-social:hover {
            border-color: #facc15;
            background: rgba(250, 204, 21, 0.05);
        }
        .btn-social.google i { color: #ea4335; }
        .btn-social.facebook i { color: #1877f2; }
        .btn-social.phone i { color: #25d366; }
        .btn-social.email i { color: #facc15; }
        .btn-otp {
            padding: 12px;
            border: 1px solid #334155;
            border-radius: 10px;
            background: transparent;
            color: #e2e8f0;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            margin-top: 10px;
        }
        .btn-otp:hover {
            border-color: #facc15;
            background: rgba(250, 204, 21, 0.05);
        }
        .btn-otp i { color: #facc15; }
        .auth-footer {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #334155;
        }
        .auth-footer a {
            color: #facc15;
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        .success-msg {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid #22c55e;
            color: #22c55e;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .success-msg.show {
            display: block;
        }
        .terms {
            color: #64748b;
            font-size: 12px;
            text-align: center;
            margin-top: 16px;
        }
        .terms a {
            color: #facc15;
            text-decoration: none;
        }
        @media (max-width: 480px) {
            .auth-container { padding: 32px 20px; }
            .social-login { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <!-- Logo -->
    <div class="auth-logo">
        <img src="logo.jpeg" alt="PRADH DESI FUEL">
        <h1>PRADH <span>Desi Fuel</span></h1>
    </div>

    <div class="auth-title">Create Account</div>
    <div class="auth-subtitle">Join the PRADH family 💪</div>

    <!-- Messages -->
    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>

    <!-- Signup Form -->
    <form id="signupForm">
        <div class="form-group">
            <label><i class="fas fa-user"></i> Full Name</label>
            <input type="text" id="username" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email Address</label>
            <input type="email" id="email" placeholder="your@email.com" required>
        </div>

        <div class="form-group">
            <label><i class="fas fa-phone"></i> Phone Number</label>
            <input type="tel" id="phone" placeholder="9876543210">
        </div>

        <div class="form-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <div class="input-icon">
                <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
                <i class="fas fa-eye" id="togglePassword" onclick="togglePassword()"></i>
            </div>
        </div>

        <button type="submit" class="btn-auth" id="signupBtn">
            <i class="fas fa-user-plus"></i> Create Account
        </button>
    </form>

    <!-- Divider -->
    <div class="divider">or sign up with</div>

    <!-- Social Login -->
    <div class="social-login">
        <button class="btn-social google" onclick="socialLogin('google')">
            <i class="fab fa-google"></i> Google
        </button>
        <button class="btn-social facebook" onclick="socialLogin('facebook')">
            <i class="fab fa-facebook-f"></i> Facebook
        </button>
    </div>

    <!-- OTP Login -->
    <button class="btn-otp" onclick="otpLogin()">
        <i class="fas fa-mobile-alt"></i> Sign up with Phone (OTP)
    </button>

    <!-- Terms -->
    <div class="terms">
        By signing up, you agree to our <a href="#">Terms of Service</a> &amp; <a href="#">Privacy Policy</a>
    </div>

    <!-- Footer -->
    <div class="auth-footer">
        Already have an account? <a href="userlogin.html">Login here</a>
    </div>
</div>

<script>
    // ============================================
    // TOGGLE PASSWORD
    // ============================================
    function togglePassword() {
        const password = document.getElementById('password');
        const icon = document.getElementById('togglePassword');
        if (password.type === 'password') {
            password.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            password.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }

    // ============================================
    // SIGNUP FORM SUBMIT
    // ============================================
    document.getElementById('signupForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const btn = document.getElementById('signupBtn');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        errorMsg.classList.remove('show');
        successMsg.classList.remove('show');

        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !email || !password) {
            errorMsg.textContent = '⚠️ Please fill all required fields';
            errorMsg.classList.add('show');
            return;
        }

        if (password.length < 6) {
            errorMsg.textContent = '⚠️ Password must be at least 6 characters';
            errorMsg.classList.add('show');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';

        try {
            const response = await fetch('/api/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password, phone })
            });

            const data = await response.json();

            if (data.success) {
                successMsg.textContent = '✅ ' + data.message;
                successMsg.classList.add('show');

                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));

                setTimeout(() => {
                    window.location.href = 'myaccount.html';
                }, 1500);
            } else {
                errorMsg.textContent = data.message || '❌ Signup failed';
                errorMsg.classList.add('show');
            }
        } catch (error) {
            console.error('Signup error:', error);
            errorMsg.textContent = '❌ Network error. Please try again.';
            errorMsg.classList.add('show');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
        }
    });

    // ============================================
    // SOCIAL LOGIN (DEMO)
    // ============================================
    function socialLogin(provider) {
        alert('🔜 ' + provider.charAt(0).toUpperCase() + provider.slice(1) + ' login coming soon!');
    }

    // ============================================
    // OTP LOGIN (DEMO)
    // ============================================
    function otpLogin() {
        const phone = prompt('📱 Enter your phone number for OTP verification:');
        if (phone) {
            alert('📱 OTP sent to ' + phone + ' (Demo: 123456)');
            // Redirect to OTP verification page (can be implemented later)
        }
    }

    // ============================================
    // ENTER KEY SUPPORT
    // ============================================
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('signupBtn').click();
        }
    });
</script>
</body>
</html>
