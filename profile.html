<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Profile | PRADH</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent-grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --bg-color: #0f172a;
        }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-color); color: #fff; padding: 40px; }
        .container { max-width: 900px; margin: auto; }

        /* Fancy Header */
        .profile-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px);
            padding: 40px; 
            border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .avatar-box { 
            width: 120px; height: 120px; 
            background: var(--accent-grad); 
            margin: 0 auto 20px; 
            border-radius: 40px; 
            display: flex; align-items: center; justify-content: center;
            font-size: 50px; box-shadow: 0 20px 40px rgba(99, 102, 241, 0.3);
        }

        /* Color Grids */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
        .stat-item { 
            background: rgba(255,255,255,0.03); padding: 20px; 
            border-radius: 20px; border-bottom: 4px solid #6366f1;
        }

        /* Beautiful Table */
        .history-card { margin-top: 30px; background: #1e293b; padding: 30px; border-radius: 25px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 15px; }
        tr { background: #0f172a; border-radius: 15px; }
        td { padding: 20px; }
        
        .status-pill { 
            background: var(--accent-grad); padding: 6px 15px; 
            border-radius: 50px; font-size: 12px; 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-card">
        <div class="avatar-box"><i class="fas fa-user-astronaut"></i></div>
        <h1>Prashant Sengar</h1>
        <p style="color: #94a3b8;">Full Stack Developer | PRADH Member</p>
        
        <div class="stats-grid">
            <div class="stat-item"><h3>12</h3><p style="color:#94a3b8; font-size:12px;">Orders</p></div>
            <div class="stat-item"><h3>₹14.5k</h3><p style="color:#94a3b8; font-size:12px;">Spent</p></div>
            <div class="stat-item"><h3>Gold</h3><p style="color:#94a3b8; font-size:12px;">Rank</p></div>
        </div>
    </div>

    <div class="history-card">
        <h2>Order Timeline</h2>
        <table>
            <tr>
                <td>#ORD992</td>
                <td>Premium Protein</td>
                <td><span class="status-pill">Delivered</span></td>
            </tr>
            <tr style="opacity: 0.7;">
                <td>#ORD993</td>
                <td>Daily Vitamins</td>
                <td><span class="status-pill" style="background:#475569;">Pending</span></td>
            </tr>
        </table>
    </div>
</div>

</body>
</html>
