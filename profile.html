<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Profile | PRADH</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent-grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --bg-color: #0f172a;
        }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-color); color: #fff; padding: 40px; }
        .container { max-width: 900px; margin: auto; }

        .profile-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px);
            padding: 40px; 
            border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .avatar-box { 
            width: 120px; height: 120px; 
            background: var(--accent-grad); 
            margin: 0 auto 20px; 
            border-radius: 40px; 
            display: flex; align-items: center; justify-content: center;
            font-size: 50px; box-shadow: 0 20px 40px rgba(99, 102, 241, 0.3);
        }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
        .stat-item { 
            background: rgba(255,255,255,0.03); padding: 20px; 
            border-radius: 20px; border-bottom: 4px solid #6366f1;
        }

        .history-card { margin-top: 30px; background: #1e293b; padding: 30px; border-radius: 25px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 15px; }
        tr { background: #0f172a; border-radius: 15px; }
        td { padding: 20px; }
        
        .status-pill { 
            background: var(--accent-grad); padding: 6px 15px; 
            border-radius: 50px; font-size: 12px; 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-card">
        <div class="avatar-box"><i class="fas fa-user-astronaut"></i></div>
        <h1 id="profileName">Loading...</h1>
        <p style="color: #94a3b8;">PRADH Member</p>
        
        <div class="stats-grid">
            <div class="stat-item"><h3 id="orderCount">0</h3><p style="color:#94a3b8; font-size:12px;">Orders</p></div>
            <div class="stat-item"><h3>Gold</h3><p style="color:#94a3b8; font-size:12px;">Rank</p></div>
            <div class="stat-item" style="cursor:pointer; color:#ef4444;" onclick="logout()"><h3><i class="fas fa-sign-out-alt"></i></h3><p style="font-size:12px;">Logout</p></div>
        </div>
    </div>

    <div class="history-card">
        <h2>Order Timeline</h2>
        <table id="orderTable">
            </table>
    </div>
</div>

<script>
    const username = localStorage.getItem('loggedInUser');
    
    // 1. Auth Check
    if (!username) {
        window.location.href = 'userlogin.html';
    } else {
        document.getElementById('profileName').innerText = username;
    }

    // 2. Fetch and Display Orders
    async function loadOrders() {
        try {
            const response = await fetch('http://localhost:3000/api/orders');
            const orders = await response.json();
            
            const table = document.getElementById('orderTable');
            const userOrders = orders.filter(o => o.username === username);

            document.getElementById('orderCount').innerText = userOrders.length;

            if (userOrders.length === 0) {
                table.innerHTML = "<tr><td colspan='3' style='text-align:center;'>Koi order nahi mila!</td></tr>";
            } else {
                table.innerHTML = userOrders.map(o => `
                    <tr>
                        <td>#${o.id.toString().slice(-4)}</td>
                        <td>${o.productName || 'General Item'}</td>
                        <td><span class="status-pill">Success</span></td>
                    </tr>
                `).join('');
            }
        } catch (err) {
            console.error("Orders load nahi hue:", err);
        }
    }

    loadOrders();

    function logout() {
        localStorage.removeItem('loggedInUser');
        window.location.href = 'userlogin.html';
    }
</script>

</body>
</html>
