<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRADH | Elite Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 glass m-4 rounded-3xl p-6 flex flex-col justify-between">
        <div>
            <h1 class="text-2xl font-bold text-white mb-10 flex items-center gap-2"><i class="fa-solid fa-bolt text-yellow-400"></i> PRADH</h1>
            <nav class="space-y-4">
                <a href="#" class="block p-3 bg-indigo-600 text-white rounded-xl shadow-lg shadow-indigo-500/20"><i class="fa-solid fa-house mr-3"></i> Dashboard</a>
                <a href="order.html" class="block p-3 text-slate-400 hover:bg-slate-700 rounded-xl transition"><i class="fa-solid fa-cart-shopping mr-3"></i> Orders</a>
            </nav>
        </div>
        <button onclick="logout()" class="p-3 text-red-400 hover:bg-red-500/10 rounded-xl transition"><i class="fa-solid fa-right-from-bracket mr-3"></i> Logout</button>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <header class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-bold text-white">Dashboard Overview</h2>
            <div class="glass px-6 py-3 rounded-full text-white flex items-center gap-3">
                <span class="relative flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span></span>
                System Online
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="glass p-8 rounded-3xl text-white">
                <p class="text-slate-400 text-sm">Total Orders</p>
                <h3 class="text-4xl font-bold mt-2" id="totalOrders">0</h3>
            </div>
            <div class="glass p-8 rounded-3xl text-white">
                <p class="text-slate-400 text-sm">Total Revenue</p>
                <h3 class="text-4xl font-bold mt-2" id="totalRevenue">₹0</h3>
            </div>
        </div>

        <div class="glass p-8 rounded-3xl text-white">
            <h3 class="text-xl font-bold mb-6">Recent Transactions</h3>
            <table class="w-full text-left">
                <thead>
                    <tr class="text-slate-400 border-b border-white/10">
                        <th class="pb-4">Order ID</th>
                        <th class="pb-4">Customer</th>
                        <th class="pb-4">Status</th>
                        <th class="pb-4 text-right">Action</th>
                    </tr>
                </thead>
                <tbody id="ordersTable" class="divide-y divide-white/10">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        async function loadAdminData() {
            try {
                const res = await fetch("https://pradh-backend.onrender.com/api/orders");
                const orders = await res.json();
                const tbody = document.getElementById('ordersTable');
                tbody.innerHTML = "";
                let rev = 0;

                orders.reverse().forEach(o => {
                    rev += o.totalAmount || 0;
                    tbody.innerHTML += `
                        <tr class="hover:bg-white/5 transition">
                            <td class="py-4 font-mono text-blue-400">#${o._id.slice(-6)}</td>
                            <td class="py-4">${o.name}<br><small class="text-slate-500">${o.phone}</small></td>
                            <td class="py-4"><span class="px-3 py-1 rounded-full text-xs ${o.status === 'Completed' ? 'bg-green-500/20 text-green-400' : 'bg-yellow-500/20 text-yellow-400'}">${o.status}</span></td>
                            <td class="py-4 text-right">
                                <button onclick="updateStatus('${o._id}')" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-lg transition">Done</button>
                            </td>
                        </tr>
                    `;
                });
                document.getElementById('totalOrders').innerText = orders.length;
                document.getElementById('totalRevenue').innerText = "₹" + rev.toLocaleString();
            } catch(e) { console.error(e); }
        }

        async function updateStatus(id) {
            await fetch(`https://pradh-backend.onrender.com/api/orders/${id}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({status: 'Completed'})
            });
            loadAdminData();
        }

        function logout() { localStorage.clear(); window.location.href = "admin.html"; }
        if(localStorage.getItem("adminLoggedIn") !== "true") window.location.href = "admin.html";
        loadAdminData();
    </script>
</body>
</html>
