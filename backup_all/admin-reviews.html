<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRADH - Review Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }
        .admin-container {
            display: flex;
            min-height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            width: 260px;
            background: #1e293b;
            border-right: 1px solid #334155;
            padding: 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: transform 0.3s ease;
            z-index: 1000;
        }
        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
            margin-bottom: 20px;
        }
        .sidebar-brand h2 { color: #facc15; font-size: 20px; }
        .sidebar-brand span { color: #94a3b8; font-size: 12px; display: block; }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #94a3b8;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 4px;
            text-decoration: none;
        }
        .nav-item:hover { background: #334155; color: #ffffff; }
        .nav-item.active { background: #facc15; color: #0f172a; }
        .nav-item i { width: 20px; }
        
        .main-content {
            margin-left: 260px;
            flex: 1;
            padding: 30px;
            min-height: 100vh;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header h1 {
            color: #facc15;
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-card .number {
            font-size: 28px;
            font-weight: 700;
            color: #facc15;
        }
        .stat-card .label {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .filter-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding: 15px;
            background: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;
        }
        .filter-btn {
            padding: 6px 16px;
            border: 1px solid #334155;
            border-radius: 20px;
            background: transparent;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-btn:hover { border-color: #facc15; color: #facc15; }
        .filter-btn.active { background: #facc15; color: #0f172a; border-color: #facc15; }
        
        .review-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        .review-card:hover { border-color: #facc15; }
        .review-card.pending { border-left: 4px solid #facc15; }
        .review-card.approved { border-left: 4px solid #22c55e; }
        .review-card.rejected { border-left: 4px solid #ef4444; opacity: 0.7; }
        
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }
        .review-product {
            color: #facc15;
            font-weight: 600;
        }
        .review-rating {
            color: #facc15;
            font-size: 1.2rem;
        }
        .review-user { color: #ffffff; font-weight: 500; }
        .review-date { color: #94a3b8; font-size: 0.8rem; }
        .review-comment { color: #e2e8f0; margin: 10px 0; line-height: 1.6; }
        .status-badge {
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pending { background: #facc15; color: #0f172a; }
        .status-approved { background: #22c55e; color: #0f172a; }
        .status-rejected { background: #ef4444; color: white; }
        
        .review-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-approve { background: #22c55e; color: #0f172a; }
        .btn-approve:hover { background: #16a34a; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3); }
        .btn-reject { background: #ef4444; color: white; }
        .btn-reject:hover { background: #dc2626; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); }
        .btn-edit { background: #3b82f6; color: white; }
        .btn-edit:hover { background: #2563eb; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
        .btn-delete { background: #ef4444; color: white; }
        .btn-delete:hover { background: #dc2626; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-content {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }
        .modal-content h3 { color: #facc15; margin-bottom: 20px; }
        .modal-close {
            float: right;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 24px;
            cursor: pointer;
        }
        .modal-close:hover { color: #ffffff; }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: #ffffff;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .form-input:focus {
            outline: none;
            border-color: #facc15;
        }
        
        .no-reviews {
            text-align: center;
            color: #94a3b8;
            padding: 40px;
        }
        
        .mobile-toggle {
            display: none;
            background: #1e293b;
            color: #facc15;
            border: 1px solid #334155;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
        }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 20px; }
            .mobile-toggle { display: inline-block; }
            .review-header { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <h2>PRADH <span>Admin</span></h2>
            </div>
            <nav>
                <a href="admin-dashboard.html" class="nav-item">
                    <i class="fas fa-chart-pie"></i> Dashboard
                </a>
                <a href="admin-dashboard.html#products" class="nav-item">
                    <i class="fas fa-box"></i> Products
                </a>
                <a href="admin-dashboard.html#orders" class="nav-item">
                    <i class="fas fa-shopping-bag"></i> Orders
                </a>
                <a href="admin-dashboard.html#coupons" class="nav-item">
                    <i class="fas fa-ticket-alt"></i> Coupons
                </a>
                <a href="admin-reviews.html" class="nav-item active">
                    <i class="fas fa-star"></i> Reviews
                    <span class="badge" id="pendingBadge" style="background: #ef4444; color: white; padding: 2px 10px; border-radius: 12px; font-size: 11px; margin-left: auto;">0</span>
                </a>
                <a href="admin-dashboard.html#customers" class="nav-item">
                    <i class="fas fa-users"></i> Customers
                </a>
                <a href="admin.html" class="nav-item" style="margin-top: 20px; border-top: 1px solid #334155; padding-top: 16px; color: #ef4444;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <button class="mobile-toggle" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            
            <div class="header">
                <h1><i class="fas fa-star"></i> Review Management</h1>
                <button onclick="loadReviews()" class="btn" style="background: #facc15; color: #0f172a;">
                    <i class="fas fa-sync"></i> Refresh
                </button>
            </div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="number" id="totalReviews">0</div>
                    <div class="label">Total Reviews</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="pendingReviews">0</div>
                    <div class="label">Pending Approval</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="approvedReviews">0</div>
                    <div class="label">Approved</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="rejectedReviews">0</div>
                    <div class="label">Rejected</div>
                </div>
            </div>

            <!-- Filter Bar -->
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all" onclick="filterReviews('all')">All</button>
                <button class="filter-btn" data-filter="pending" onclick="filterReviews('pending')">
                    Pending <span id="pendingFilterCount" style="background: #facc15; color: #0f172a; padding: 0 8px; border-radius: 10px; font-size: 11px;">0</span>
                </button>
                <button class="filter-btn" data-filter="approved" onclick="filterReviews('approved')">Approved</button>
                <button class="filter-btn" data-filter="rejected" onclick="filterReviews('rejected')">Rejected</button>
            </div>

            <!-- Reviews List -->
            <div id="reviewsContainer">
                <div style="text-align: center; color: #94a3b8; padding: 40px;">
                    <i class="fas fa-spinner fa-spin"></i> Loading reviews...
                </div>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <h3><i class="fas fa-edit"></i> Edit Review</h3>
            <input type="hidden" id="editReviewId">
            <div style="margin-bottom: 15px;">
                <label style="color: #94a3b8; display: block; margin-bottom: 5px;">Rating</label>
                <select id="editRating" class="form-input">
                    <option value="5">5 ★</option>
                    <option value="4">4 ★</option>
                    <option value="3">3 ★</option>
                    <option value="2">2 ★</option>
                    <option value="1">1 ★</option>
                </select>
            </div>
            <div style="margin-bottom: 15px;">
                <label style="color: #94a3b8; display: block; margin-bottom: 5px;">Comment</label>
                <textarea id="editComment" class="form-input" rows="4"></textarea>
            </div>
            <div style="display: flex; gap: 10px;">
                <button onclick="saveEdit()" class="btn btn-approve" style="flex: 1; justify-content: center;">
                    <i class="fas fa-save"></i> Save Changes
                </button>
                <button onclick="closeModal()" class="btn btn-delete">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let allReviews = [];
        let currentFilter = 'all';

        // ============================================
        // TOGGLE SIDEBAR
        // ============================================
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // ============================================
        // LOAD REVIEWS
        // ============================================
        async function loadReviews() {
            try {
                const response = await fetch('/api/reviews');
                const data = await response.json();
                
                if (data.success) {
                    allReviews = data.reviews;
                    updateStats(allReviews);
                    filterReviews(currentFilter);
                }
            } catch (error) {
                console.error('Error loading reviews:', error);
                document.getElementById('reviewsContainer').innerHTML = `
                    <div style="text-align: center; color: #ef4444; padding: 40px;">
                        <i class="fas fa-exclamation-circle"></i> Error loading reviews: ${error.message}
                    </div>
                `;
            }
        }

        // ============================================
        // UPDATE STATS
        // ============================================
        function updateStats(reviews) {
            const total = reviews.length;
            const pending = reviews.filter(r => r.status === 'pending').length;
            const approved = reviews.filter(r => r.status === 'approved').length;
            const rejected = reviews.filter(r => r.status === 'rejected').length;
            
            document.getElementById('totalReviews').textContent = total;
            document.getElementById('pendingReviews').textContent = pending;
            document.getElementById('approvedReviews').textContent = approved;
            document.getElementById('rejectedReviews').textContent = rejected;
            document.getElementById('pendingBadge').textContent = pending;
            document.getElementById('pendingFilterCount').textContent = pending;
        }

        // ============================================
        // FILTER REVIEWS
        // ============================================
        function filterReviews(status) {
            currentFilter = status;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === status);
            });
            
            let filtered = allReviews;
            if (status !== 'all') {
                filtered = allReviews.filter(r => r.status === status);
            }
            displayReviews(filtered);
        }

        // ============================================
        // DISPLAY REVIEWS
        // ============================================
        function displayReviews(reviews) {
            const container = document.getElementById('reviewsContainer');
            
            if (reviews.length === 0) {
                container.innerHTML = `
                    <div class="no-reviews">
                        <i class="fas fa-comment" style="font-size: 40px; display: block; margin-bottom: 10px; color: #334155;"></i>
                        No reviews found
                    </div>
                `;
                return;
            }
            
            container.innerHTML = reviews.map(review => `
                <div class="review-card ${review.status}">
                    <div class="review-header">
                        <div>
                            <div class="review-product">
                                <i class="fas fa-box"></i> ${review.productName || 'Product'}
                            </div>
                            <div class="review-rating">${'★'.repeat(review.rating)}${'☆'.repeat(5 - review.rating)}</div>
                            <div class="review-user">
                                <i class="fas fa-user"></i> ${review.userName || 'Anonymous'}
                            </div>
                            <div class="review-date">
                                <i class="far fa-calendar-alt"></i> ${new Date(review.createdAt).toLocaleDateString('en-IN', { 
                                    day: '2-digit', 
                                    month: 'short', 
                                    year: 'numeric',
                                    hour: '2-digit',
                                    minute: '2-digit'
                                })}
                            </div>
                        </div>
                        <div>
                            <span class="status-badge status-${review.status}">
                                ${review.status.toUpperCase()}
                            </span>
                        </div>
                    </div>
                    <div class="review-comment">${review.comment}</div>
                    <div class="review-actions">
                        ${review.status === 'pending' ? `
                            <button class="btn btn-approve" onclick="updateReviewStatus('${review.id}', 'approved')">
                                <i class="fas fa-check"></i> Approve
                            </button>
                            <button class="btn btn-reject" onclick="updateReviewStatus('${review.id}', 'rejected')">
                                <i class="fas fa-times"></i> Reject
                            </button>
                        ` : `
                            ${review.status === 'approved' ? `
                                <button class="btn btn-reject" onclick="updateReviewStatus('${review.id}', 'rejected')">
                                    <i class="fas fa-times"></i> Reject
                                </button>
                            ` : `
                                <button class="btn btn-approve" onclick="updateReviewStatus('${review.id}', 'approved')">
                                    <i class="fas fa-check"></i> Approve
                                </button>
                            `}
                        `}
                        <button class="btn btn-edit" onclick="openEditModal('${review.id}')">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                        <button class="btn btn-delete" onclick="deleteReview('${review.id}')">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // ============================================
        // UPDATE REVIEW STATUS (Approve/Reject)
        // ============================================
        async function updateReviewStatus(reviewId, status) {
            const action = status === 'approved' ? 'approve' : 'reject';
            if (!confirm(`Are you sure you want to ${action} this review?`)) return;
            
            try {
                const response = await fetch(`/api/reviews/${reviewId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert(`✅ Review ${action}d successfully!`);
                    loadReviews();
                } else {
                    alert('❌ Error: ' + data.error);
                }
            } catch (error) {
                console.error('Error updating review:', error);
                alert('❌ Error updating review: ' + error.message);
            }
        }

        // ============================================
        // OPEN EDIT MODAL
        // ============================================
        function openEditModal(reviewId) {
            const review = allReviews.find(r => r.id === reviewId);
            if (!review) return;
            
            document.getElementById('editReviewId').value = reviewId;
            document.getElementById('editRating').value = review.rating;
            document.getElementById('editComment').value = review.comment;
            document.getElementById('editModal').classList.add('show');
        }

        // ============================================
        // SAVE EDIT
        // ============================================
        async function saveEdit() {
            const reviewId = document.getElementById('editReviewId').value;
            const rating = document.getElementById('editRating').value;
            const comment = document.getElementById('editComment').value.trim();
            
            if (!comment) {
                alert('Please enter a comment');
                return;
            }
            
            try {
                const response = await fetch(`/api/reviews/${reviewId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rating: parseInt(rating), comment })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ Review updated successfully!');
                    closeModal();
                    loadReviews();
                } else {
                    alert('❌ Error: ' + data.error);
                }
            } catch (error) {
                console.error('Error saving edit:', error);
                alert('❌ Error saving edit: ' + error.message);
            }
        }

        // ============================================
        // DELETE REVIEW
        // ============================================
        async function deleteReview(reviewId) {
            if (!confirm('Are you sure you want to delete this review?')) return;
            
            try {
                const response = await fetch(`/api/reviews/${reviewId}`, {
                    method: 'DELETE'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ Review deleted successfully!');
                    loadReviews();
                } else {
                    alert('❌ Error: ' + data.error);
                }
            } catch (error) {
                console.error('Error deleting review:', error);
                alert('❌ Error deleting review: ' + error.message);
            }
        }

        // ============================================
        // CLOSE MODAL
        // ============================================
        function closeModal() {
            document.getElementById('editModal').classList.remove('show');
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            loadReviews();
        });

        // Make functions global
        window.filterReviews = filterReviews;
        window.updateReviewStatus = updateReviewStatus;
        window.openEditModal = openEditModal;
        window.saveEdit = saveEdit;
        window.deleteReview = deleteReview;
        window.closeModal = closeModal;
        window.loadReviews = loadReviews;
        window.toggleSidebar = toggleSidebar;
    </script>
</body>
</html>
