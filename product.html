<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | PRADH DESI FUEL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="announcement-bar">
        <div class="announcement-text" id="announcement-text">
            🔥 Use Code: <span class="coupon-highlight">DESIFUEL10</span> for extra 10% OFF on your first order!
        </div>
    </div>

    <header>
        <div class="nav-container">
            <div class="logo"><a href="index.html">PRADH <span></span></a></div>
            <div class="menu-toggle" id="menuToggle">
                <span></span><span></span><span></span>
                <div id="mobile-cart-badge" style="display: none;"></div>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="product.html" class="nav-link active">Products</a></li>
                <li><a href="about.html" class="nav-link">Our Story</a></li>
                <li><a href="contact.html" class="nav-link">Contact & Policies</a></li>
                <li><a href="cart.html" class="nav-link cart-icon-wrapper">Cart <span id="cart-count">0</span></a></li>
            </ul>
        </div>
    </header>

    <main class="section">
        <h2 class="section-title">Select Your Fuel Pack</h2>
        <div class="product-grid" id="productGrid">
            <!-- Products will be dynamically loaded here -->
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <script src="main.js"></script>
    
    <a href="https://wa.me/918979993655?text=Hello%20PRADH%20Desi%20Fuel!%20I%20have%20a%20query%20about%20your%20product." 
       class="whatsapp-floating-btn" 
       target="_blank" 
       title="Chat with us on WhatsApp">
        <svg viewBox="0 0 32 32" class="whatsapp-svg">
            <path d="M16 2a13 13 0 0 0-11.3 19.4L3 29l7.8-2A13 13 0 1 0 16 2zm0 24a11 11 0 0 1-5.6-1.5l-.4-.2-4.6 1.2 1.2-4.5-.3-.4A11 11 0 1 1 16 26zm5.9-8.1c-.3-.2-1.9-1-2.2-1.1-.3-.1-.5-.1-.7.2l-1 1.3c-.2.3-.5.3-.8.1a10.3 10.3 0 0 1-3.7-2.3 11.4 11.4 0 0 1-2.5-3.2c-.2-.4 0-.6.2-.8l.6-.7v-.4c-.2-.5-.7-1.7-1-2.4-.2-.6-.5-.6-.7-.6h-.6a1.3 1.3 0 0 0-1 .4 4.8 4.8 0 0 0-1.5 3.5 8.3 8.3 0 0 0 1.8 4.4 19 19 0 0 0 7.3 6.5c3.5 1.4 4.2 1.1 5 1a4.2 4.2 0 0 0 2.8-2 3.4 3.4 0 0 0 .2-2c-.1-.2-.4-.3-.7-.5z"/>
        </svg>
    </a>
    
    <footer>
        <div style="max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 1rem;">
            <p>&copy; 2026 <span>PRADH </span>. All Rights Reserved.</p>
            <a href="https://forms.gle/wybyGnhVKrNikMJV6" target="_blank" class="feedback-btn">📝 Share Your Feedback</a>
        </div>
    </footer>

    <script>
        // ============================================
        // LOAD PRODUCTS FROM SERVER
        // ============================================
        async function loadProducts() {
            const grid = document.getElementById('productGrid');
            
            try {
                const response = await fetch('/api/admin/products');
                const data = await response.json();
                
                if (data.success && data.products && data.products.length > 0) {
                    grid.innerHTML = data.products.map(product => `
                        <div class="product-card">
                            <a href="product-detail.html?id=${product.id}" target="_blank" style="text-decoration: none; color: inherit;">
                                <div class="product-img-container">
                                    <img src="${product.image || 'product1.jpeg'}" 
                                         alt="${product.name}" 
                                         class="product-real-img" 
                                         onerror="this.src='product1.jpeg'; this.onerror=null;">
                                </div>
                            </a>
                            <div class="product-info">
                                <a href="product-detail.html?id=${product.id}" target="_blank" style="text-decoration: none; color: inherit;">
                                    <h3 class="product-title" style="cursor: pointer;">${product.name}</h3>
                                </a>
                                <p class="product-desc">${product.description || 'Premium quality product'}</p>
                                <div class="product-meta">
                                    <span class="product-price">₹${product.price}</span>
                                    <button class="btn btn-primary" 
                                            onclick="event.stopPropagation(); addToCart('${product.id}', '${product.name}', ${product.price}, '${product.category || 'Standard'}')"
                                            ${product.stock <= 0 ? 'disabled' : ''}>
                                        ${product.stock <= 0 ? 'Out of Stock' : 'Add To Cart'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    grid.innerHTML = `
                        <div class="no-products">
                            <i class="fas fa-box-open"></i>
                            <h3>No Products Available</h3>
                            <p>Check back soon for new products!</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading products:', error);
                grid.innerHTML = `
                    <div class="no-products">
                        <i class="fas fa-exclamation-triangle" style="color: #ef4444; font-size: 40px; display: block; margin-bottom: 15px;"></i>
                        <h3 style="color: #ffffff;">Error Loading Products</h3>
                        <p style="color: #94a3b8;">${error.message}</p>
                        <button onclick="loadProducts()" class="btn btn-primary" style="margin-top: 15px;">
                            <i class="fas fa-sync"></i> Retry
                        </button>
                    </div>
                `;
            }
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            loadProducts();
            if (window.updateCartBadge) window.updateCartBadge();
        });
    </script>
</body>
</html>
