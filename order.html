<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - PRADH Protein</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .orders-container {
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
        }
        .order-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid #f5f5f5;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }
        .order-status {
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .status-paid { background: #d4edda; color: #155724; }
        .status-pending { background: #fff3cd; color: #856404; }
        .order-total {
            text-align: right;
            font-size: 18px;
            font-weight: bold;
            padding-top: 15px;
            border-top: 2px solid #f5f5f5;
            margin-top: 15px;
        }
        .no-orders {
            text-align: center;
            padding: 60px 20px;
        }
        .no-orders a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: #3399ff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">💪 PRADH Protein</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="product.html">Products</a>
                <a href="cart.html">Cart</a>
                <a href="myaccount.html">Account</a>
            </div>
        </div>
    </nav>

    <div class="orders-container">
        <h2>📦 My Orders</h2>
        <div id="ordersList">
            <div style="text-align: center; padding: 40px;">
                Loading orders...
            </div>
        </div>
    </div>

    <script>
        async function fetchOrders() {
            try {
                const response = await fetch('/get-orders');
                const data = await response.json();
                
                if (data.success && data.orders && data.orders.length > 0) {
                    displayOrders(data.orders);
                } else {
                    document.getElementById('ordersList').innerHTML = `
                        <div class="no-orders">
                            <h3>🛒 No orders yet</h3>
                            <p>Start shopping to see your orders here.</p>
                            <a href="product.html">Browse Products</a>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error fetching orders:', error);
                document.getElementById('ordersList').innerHTML = `
                    <div class="no-orders">
                        <h3>⚠️ Error loading orders</h3>
                        <p>Please try again later.</p>
                    </div>
                `;
            }
        }

        function displayOrders(orders) {
            const container = document.getElementById('ordersList');
            container.innerHTML = orders.reverse().map(order => `
                <div class="order-card">
                    <div class="order-header">
                        <div>
                            <strong>Order #${order.id}</strong>
                            <br>
                            <small>${new Date(order.date).toLocaleDateString('en-IN', { 
                                day: '2-digit', 
                                month: 'short', 
                                year: 'numeric',
                                hour: '2-digit',
                                minute: '2-digit'
                            })}</small>
                        </div>
                        <div>
                            <span class="order-status status-${order.status}">${(order.status || 'pending').toUpperCase()}</span>
                        </div>
                    </div>
                    <div>
                        ${order.items && order.items.length > 0 ? order.items.map(item => `
                            <div class="order-item">
                                <span>${item.name} × ${item.quantity}</span>
                                <span>₹${(item.price * item.quantity).toFixed(2)}</span>
                            </div>
                        `).join('') : '<p>No items details</p>'}
                    </div>
                    <div class="order-total">
                        Total: ₹${(order.total || 0).toFixed(2)}
                    </div>
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', fetchOrders);
    </script>
</body>
</html>
